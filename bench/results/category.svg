<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 460" width="880" height="460">
  <style>
    .root { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', Helvetica, Arial, sans-serif; }
    .title { font-size: 22px; font-weight: 700; fill: #f5f5f7; letter-spacing: -0.012em; }
    .subtitle { font-size: 13px; font-weight: 400; fill: #a1a1a6; }
    .axis-label { font-size: 12px; font-weight: 500; fill: #8e8e93; font-variant-numeric: tabular-nums; }
    .bar-label { font-size: 13px; font-weight: 600; fill: #f5f5f7; }
    .bar-sub { font-size: 11px; font-weight: 400; fill: #8e8e93; }
    .bar-value { font-size: 16px; font-weight: 600; fill: #f5f5f7; font-variant-numeric: tabular-nums; }
    .footnote { font-size: 11px; font-weight: 400; fill: #8e8e93; }
    text { dominant-baseline: middle; }
  </style>
  <rect width="880" height="460" fill="#000000"/>
  <g class="root">
  <text x="70" y="44" class="title">Pass-rate by category</text>
  <text x="70" y="68" class="subtitle">@peteqian/browser-agent</text>
  <line x1="70" y1="100" x2="70" y2="360" stroke="#3a3a3c" stroke-width="1"/>
  <line x1="70" y1="360" x2="840" y2="360" stroke="#3a3a3c" stroke-width="1"/>
  <line x1="70" y1="360" x2="840" y2="360" stroke="#1c1c1e" stroke-width="1"/>
  <text x="58" y="360" text-anchor="end" class="axis-label">0</text>
  <line x1="70" y1="230" x2="840" y2="230" stroke="#1c1c1e" stroke-width="1"/>
  <text x="58" y="230" text-anchor="end" class="axis-label">1</text>
  <line x1="70" y1="100" x2="840" y2="100" stroke="#1c1c1e" stroke-width="1"/>
  <text x="58" y="100" text-anchor="end" class="axis-label">2</text>
  <rect x="105.5" y="100" width="38.5" height="260" rx="4" fill="#0a84ff"/>
  <rect x="150" y="100" width="38.5" height="260" rx="4" fill="#636366"/>
  <text x="147" y="382" text-anchor="middle" class="bar-label">custom</text>
  <rect x="259.5" y="230" width="38.5" height="130" rx="4" fill="#0a84ff"/>
  <rect x="304" y="100" width="38.5" height="260" rx="4" fill="#636366"/>
  <text x="301" y="382" text-anchor="middle" class="bar-label">form</text>
  <rect x="413.5" y="230" width="38.5" height="130" rx="4" fill="#0a84ff"/>
  <rect x="458" y="100" width="38.5" height="260" rx="4" fill="#636366"/>
  <text x="455" y="382" text-anchor="middle" class="bar-label">multi-step</text>
  <rect x="567.5" y="100" width="38.5" height="260" rx="4" fill="#0a84ff"/>
  <rect x="612" y="100" width="38.5" height="260" rx="4" fill="#636366"/>
  <text x="609" y="382" text-anchor="middle" class="bar-label">qa</text>
  <rect x="721.5" y="230" width="38.5" height="130" rx="4" fill="#0a84ff"/>
  <rect x="766" y="100" width="38.5" height="260" rx="4" fill="#636366"/>
  <text x="763" y="382" text-anchor="middle" class="bar-label">stealth</text>
  <rect x="747" y="64" width="14" height="12" rx="3" fill="#636366"/>
  <text x="767" y="70" class="bar-label">attempted</text>
  <rect x="675" y="64" width="14" height="12" rx="3" fill="#0a84ff"/>
  <text x="695" y="70" class="bar-label">passed</text>
  <text x="70" y="442" class="footnote">Five categories × two tasks. Full per-task verdicts in bench/results/.</text>
  </g>
</svg>
