<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 360" width="880" height="360" role="img" aria-label="Pass-rate comparison: @peteqian/browser-agent 7 of 10 vs browser-use 3 of 10">
  <style>
    .root { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', Helvetica, Arial, sans-serif; }
    .title { font-size: 24px; font-weight: 700; fill: #f5f5f7; letter-spacing: -0.012em; }
    .subtitle { font-size: 14px; font-weight: 400; fill: #a1a1a6; letter-spacing: -0.003em; }
    .row-label { font-size: 16px; font-weight: 600; fill: #f5f5f7; }
    .row-meta { font-size: 12px; font-weight: 400; fill: #8e8e93; }
    .bar-value { font-size: 22px; font-weight: 600; fill: #f5f5f7; font-variant-numeric: tabular-nums; }
    .bar-percent { font-size: 13px; font-weight: 500; fill: #a1a1a6; font-variant-numeric: tabular-nums; }
    .footnote { font-size: 12px; font-weight: 400; fill: #8e8e93; }
    text { dominant-baseline: middle; }
  </style>
  <g class="root">
    <rect width="880" height="360" fill="#000000"/>

    <text x="48" y="56" class="title">Pass-rate, 10-task browser benchmark</text>
    <text x="48" y="84" class="subtitle">Same tasks. Same judge (claude-sonnet-4-5). Cold browser per task.</text>

    <!-- Row 1: @peteqian/browser-agent -->
    <g transform="translate(48, 138)">
      <text x="0" y="-8" class="row-label">@peteqian/browser-agent</text>
      <text x="220" y="-8" class="row-meta">codex SDK · avg 6.6 steps/task</text>
      <rect x="0" y="6" width="640" height="28" rx="14" fill="#1c1c1e"/>
      <rect x="0" y="6" width="448" height="28" rx="14" fill="#0a84ff"/>
      <text x="460" y="20" class="bar-value">7 <tspan class="bar-percent">/ 10  ·  70%</tspan></text>
    </g>

    <!-- Row 2: browser-use -->
    <g transform="translate(48, 226)">
      <text x="0" y="-8" class="row-label">browser-use 0.11.7</text>
      <text x="160" y="-8" class="row-meta">gemma4:31b-cloud (Ollama) · avg 6.8 steps/task</text>
      <rect x="0" y="6" width="640" height="28" rx="14" fill="#1c1c1e"/>
      <rect x="0" y="6" width="192" height="28" rx="14" fill="#636366"/>
      <text x="204" y="20" class="bar-value">3 <tspan class="bar-percent">/ 10  ·  30%</tspan></text>
    </g>

    <text x="48" y="320" class="footnote">Different driver models — browser-use lacked an Anthropic key locally, so it ran on Ollama. See bench/ for methodology and raw bundles.</text>
  </g>
</svg>
