<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 460" width="880" height="460">
  <style>
    .root { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', Helvetica, Arial, sans-serif; }
    .title { font-size: 22px; font-weight: 700; fill: #f5f5f7; letter-spacing: -0.012em; }
    .subtitle { font-size: 13px; font-weight: 400; fill: #a1a1a6; }
    .axis-label { font-size: 12px; font-weight: 500; fill: #8e8e93; font-variant-numeric: tabular-nums; }
    .bar-label { font-size: 13px; font-weight: 600; fill: #f5f5f7; }
    .bar-sub { font-size: 11px; font-weight: 400; fill: #8e8e93; }
    .bar-value { font-size: 16px; font-weight: 600; fill: #f5f5f7; font-variant-numeric: tabular-nums; }
    .footnote { font-size: 11px; font-weight: 400; fill: #8e8e93; }
    text { dominant-baseline: middle; }
  </style>
  <rect width="880" height="460" fill="#000000"/>
  <g class="root">
  <text x="80" y="44" class="title">Average steps per task</text>
  <text x="80" y="68" class="subtitle">Lower is more efficient. Same task list, same judge.</text>
  <line x1="80" y1="100" x2="80" y2="370" stroke="#3a3a3c" stroke-width="1"/>
  <line x1="80" y1="370" x2="840" y2="370" stroke="#3a3a3c" stroke-width="1"/>
  <line x1="80" y1="370" x2="840" y2="370" stroke="#1c1c1e" stroke-width="1"/>
  <text x="68" y="370" text-anchor="end" class="axis-label">0</text>
  <line x1="80" y1="325" x2="840" y2="325" stroke="#1c1c1e" stroke-width="1"/>
  <text x="68" y="325" text-anchor="end" class="axis-label">2</text>
  <line x1="80" y1="280" x2="840" y2="280" stroke="#1c1c1e" stroke-width="1"/>
  <text x="68" y="280" text-anchor="end" class="axis-label">4</text>
  <line x1="80" y1="235" x2="840" y2="235" stroke="#1c1c1e" stroke-width="1"/>
  <text x="68" y="235" text-anchor="end" class="axis-label">6</text>
  <line x1="80" y1="190" x2="840" y2="190" stroke="#1c1c1e" stroke-width="1"/>
  <text x="68" y="190" text-anchor="end" class="axis-label">8</text>
  <line x1="80" y1="145" x2="840" y2="145" stroke="#1c1c1e" stroke-width="1"/>
  <text x="68" y="145" text-anchor="end" class="axis-label">10</text>
  <line x1="80" y1="100" x2="840" y2="100" stroke="#1c1c1e" stroke-width="1"/>
  <text x="68" y="100" text-anchor="end" class="axis-label">12</text>
  <rect x="230" y="221.50000000000003" width="80" height="148.49999999999997" rx="6" fill="#0a84ff"/>
  <text x="270" y="207.50000000000003" text-anchor="middle" class="bar-value">6.6</text>
  <text x="270" y="392" text-anchor="middle" class="bar-label">browser-agent</text>
  <text x="270" y="410" text-anchor="middle" class="bar-sub">codex SDK</text>
  <rect x="610" y="217" width="80" height="153" rx="6" fill="#636366"/>
  <text x="650" y="203" text-anchor="middle" class="bar-value">6.8</text>
  <text x="650" y="392" text-anchor="middle" class="bar-label">browser-use</text>
  <text x="650" y="410" text-anchor="middle" class="bar-sub">0.11.7</text>
  <text x="80" y="442" class="footnote">Stable-handle locators (testid → role+name → label) keep each task tight.</text>
  </g>
</svg>
